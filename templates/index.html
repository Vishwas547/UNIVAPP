<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Intelligent Request Routing and Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #f3f4f7;
  font-family: Arial, sans-serif;
}

.form-container {
  width: 800px;
  margin: 40px auto;
  background: #ffffff;
  border-radius: 8px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  overflow: hidden;
}

.header {
  background: linear-gradient(135deg, #6a11cb, #d4145a);
  color: white;
  padding: 18px;
  text-align: center;
}

.section-title {
  background: #fafafa;
  padding: 12px 20px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

.form-body {
  padding: 20px;
}

.form-row {
  display: flex;
  margin-bottom: 18px;
  align-items: center;
}

.form-row label {
  width: 200px;
  font-weight: bold;
}

.form-row input,
.form-row textarea {
  flex: 1;
  padding: 10px;
  border: 2px solid #bbb;
  border-radius: 6px;
  font-size: 14px;
}

.textarea-row textarea {
  height: 120px;
}

.submit-section {
  text-align: center;
  padding: 20px;
}

button {
  padding: 10px 30px;
  background: linear-gradient(135deg, #6a11cb, #d4145a);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 15px;
  border-radius: 5px;
}

.success-box {
  text-align: center;
  margin-bottom: 20px;
}

.tick-icon {
  width: 80px;
  height: 80px;
  margin: auto;
}
</style>
</head>

<body>

<div class="form-container">

<div class="header">
<h2>Intelligent Request Routing and Management System</h2>
</div>

<div class="section-title">
Student Request Details
</div>

<!-- SUCCESS MESSAGE FROM FLASK -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="success-box">
      <svg class="tick-icon" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="25" fill="#28a745"/>
        <path fill="none" stroke="white" stroke-width="5"
              d="M14 27 L22 35 L38 18"/>
      </svg>
      <h3 style="color:#28a745;">{{ messages[0] }}</h3>
    </div>
  {% endif %}
{% endwith %}

<form method="POST" class="form-body">

<div class="form-row">
<label>Name :</label>
<input type="text" name="name">
</div>

<div class="form-row">
<label>Student ID :</label>
<input type="text" name="sid">
</div>

<div class="form-row">
<label>Student Email :</label>
<input type="email" name="email">
</div>

<div class="form-row">
<label>Department :</label>
<input type="text" name="dept">
</div>

<div class="form-row">
<label>Class / Year :</label>
<input type="text" name="year">
</div>

<div class="form-row textarea-row">
<label>Request Description :</label>
<textarea name="request"></textarea>
</div>

<div class="submit-section">
<button type="submit">Submit</button>
</div>

</form>

</div>

</body>
</html>
