<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Intelligent Request Routing and Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #f3f4f7;
  font-family: Arial, sans-serif;
}

.form-container {
  width: 800px;
  margin: 40px auto;
  background: #ffffff;
  border-radius: 8px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  overflow: hidden;
}

.header {
  background: linear-gradient(135deg, #6a11cb, #d4145a);
  color: white;
  padding: 18px;
  text-align: center;
}

.section-title {
  background: #fafafa;
  padding: 12px 20px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

.form-body {
  padding: 20px;
}

.form-row {
  display: flex;
  margin-bottom: 18px;
  align-items: center;
}

.form-row label {
  width: 200px;
  font-weight: bold;
}

.form-row input,
.form-row textarea {
  flex: 1;
  padding: 10px;
  border: 2px solid #bbb;
  border-radius: 6px;
  font-size: 14px;
  outline: none;
  transition: 0.3s;
}

.form-row input:focus,
.form-row textarea:focus {
  border: 2px solid #6a11cb;
  box-shadow: 0 0 6px rgba(106,17,203,0.4);
}

.textarea-row textarea {
  height: 120px;
  resize: vertical;
}

.submit-section {
  text-align: center;
  padding: 20px;
}

button {
  padding: 10px 30px;
  background: linear-gradient(135deg, #6a11cb, #d4145a);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 15px;
  border-radius: 5px;
}

button:hover {
  opacity: 0.9;
}

.success-box {
  display: none;
  margin-top: 25px;
  text-align: center;
}

.tick-icon {
  width: 80px;
  height: 80px;
  margin: auto;
}

.success-text {
  color: #28a745;
  font-size: 18px;
  font-weight: bold;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="form-container">

<div class="header">
<h2>Intelligent Request Routing and Management System</h2>
</div>

<div class="section-title">
Student Request Details
</div>

<form id="requestForm" class="form-body">

<div class="form-row">
<label>Name :</label>
<input type="text" id="name">
</div>

<div class="form-row">
<label>Student ID :</label>
<input type="text" id="sid">
</div>

<div class="form-row">
<label>Student Email :</label>
<input type="email" id="email">
</div>

<div class="form-row">
<label>Department :</label>
<input type="text" id="dept">
</div>

<div class="form-row">
<label>Class / Year :</label>
<input type="text" id="year">
</div>

<div class="form-row textarea-row">
<label>Request Description :</label>
<textarea id="request"></textarea>
</div>

<div class="submit-section">
<button type="submit">Submit</button>

<div class="success-box" id="successBox">

<svg class="tick-icon" viewBox="0 0 52 52">
  <circle cx="26" cy="26" r="25" fill="#28a745"/>
  <path fill="none" stroke="white" stroke-width="5"
        d="M14 27 L22 35 L38 18"/>
</svg>

<div class="success-text">
Your request has been submitted successfully
</div>

<br>
<button type="button" onclick="goToNextPage()">Done</button>

</div>
</div>

</form>
</div>

<script>
document.getElementById("requestForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let sid = document.getElementById("sid").value.trim();
    let email = document.getElementById("email").value.trim();
    let dept = document.getElementById("dept").value.trim();
    let year = document.getElementById("year").value.trim();
    let request = document.getElementById("request").value.trim();

    if(name === ""){ alert("Please enter your Name"); return; }
    if(sid === ""){ alert("Please enter your Student ID"); return; }
    if(email === ""){ alert("Please enter your Email"); return; }
    if(dept === ""){ alert("Please enter your Department"); return; }
    if(year === ""){ alert("Please enter your Class / Year"); return; }
    if(request === ""){ alert("Please describe your Request"); return; }

    document.querySelectorAll(".form-row").forEach(row => {
        row.style.display = "none";
    });

    document.querySelector("button[type='submit']").style.display = "none";
    document.getElementById("successBox").style.display = "block";
});

function goToNextPage(){
    window.location.href = "done.html";
}
</script>

</body>
</html>
