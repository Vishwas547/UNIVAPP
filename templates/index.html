<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Intelligent Request Routing and Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  background: #f3f4f7;
  font-family: Arial, sans-serif;
}

/* Main Container */
.form-container {
  width: 800px;
  margin: 40px auto;
  background: #ffffff;
  border-radius: 8px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  overflow: hidden;
}

/* Header with Gradient */
.header {
  background: linear-gradient(135deg, #6a11cb, #d4145a);
  color: white;
  padding: 18px;
  text-align: center;
}

.header h2 {
  margin: 0;
  letter-spacing: 1px;
}

/* Section Title */
.section-title {
  background: #fafafa;
  padding: 12px 20px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

/* Form Body */
.form-body {
  padding: 20px;
}

/* Form Row */
.form-row {
  display: flex;
  margin-bottom: 18px;
  align-items: center;
}

.form-row label {
  width: 200px;
  font-weight: bold;
}

/* Thick Box Inputs */
.form-row input {
  flex: 1;
  padding: 10px;
  border: 2px solid #bbb;
  border-radius: 6px;
  font-size: 14px;
  outline: none;
  transition: 0.3s;
}

.form-row input:focus {
  border: 2px solid #6a11cb;
  box-shadow: 0 0 6px rgba(106,17,203,0.4);
}

/* TEXTAREA STYLE */
.textarea-row textarea {
  flex: 1;
  height: 120px;
  padding: 10px;
  border: 2px solid #bbb;
  border-radius: 6px;
  font-size: 14px;
  outline: none;
  resize: vertical;
  transition: 0.3s;
}

.textarea-row textarea:focus {
  border: 2px solid #d4145a;
  box-shadow: 0 0 6px rgba(212,20,90,0.4);
}

/* Button */
.submit-section {
  text-align: center;
  padding: 20px;
}

button {
  padding: 10px 30px;
  background: linear-gradient(135deg, #6a11cb, #d4145a);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 15px;
  border-radius: 5px;
  transition: 0.3s;
}

button:hover {
  opacity: 0.9;
}

/* Responsive */
@media(max-width:768px){

.form-container{
  width: 95%;
}

.form-row{
  flex-direction: column;
  align-items: flex-start;
}

.form-row label{
  width: 100%;
  margin-bottom: 5px;
}

}

</style>

</head>

<body>

<div class="form-container">

<div class="header">
<h2>Intelligent Request Routing and Management System</h2>
</div>

<div class="section-title">
Student Request Details
</div>

<form method="POST" class="form-body">

<div class="form-row">
<label>Name :</label>
<input type="text" name="name" required>
</div>

<div class="form-row">
<label>Student ID :</label>
<input type="text" name="sid" required>
</div>

<div class="form-row">
<label>Student Email :</label>
<input type="email" name="email" required>
</div>

<div class="form-row">
<label>Department :</label>
<input type="text" name="dept" required>
</div>

<div class="form-row">
<label>Class / Year :</label>
<input type="text" name="year" required>
</div>

<div class="form-row textarea-row">
<label>Request Description :</label>
<textarea name="request" placeholder="Describe your issue clearly..." required></textarea>
</div>

<div class="submit-section">
<button type="submit">Submit Request</button>
</div>

</form>

</div>

</body>
</html>
